shelly:
  display:
    ip: '192.168.1.100'  # Replace with actual Shelly BLU HT Display IP
  relay:
    ip: '192.168.1.101'  # Replace with actual Shelly Relay IP

light_control:
  light_threshold: 50  # Lux threshold
  max_hour: 18  # 6 PM cutoff
  check_interval: 5  # Check every 5 minutes

work_days:
  - 1  # Tuesday
  - 2  # Wednesday

logging:
  level: INFO
  file: '/var/log/shelly-light-control.log'