shelly:
  relay:
    ip: '192.168.4.56'  # Confirmed light switch/relay IP

light_control:
  light_threshold: 50  # Lux threshold for turning on lights
  max_hour: 20  # 8 PM cutoff time
  check_interval: 5  # Check every 5 minutes

work_days:
  - 1  # Tuesday
  - 2  # Wednesday
  - 3  # Thursday

logging:
  level: INFO
  file: '/var/log/shelly-light-control.log'